<title>Kalkulator SIKO — artyleria naziemna</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f242d; --line:#2b313c;
    --txt:#e7ebf0; --mut:#9aa4b2; --acc:#4ea1ff; --ok:#3ecf8e; --warn:#f5b740; --err:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.45}
  header{padding:calc(14px + env(safe-area-inset-top)) 20px 14px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;font-weight:650}
  header .sub{color:var(--mut);font-size:13px}
  .unit{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut)}
  select,input{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:14px;font-family:inherit}
  input{width:100%}
  nav{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;padding-left:calc(16px + env(safe-area-inset-left));background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  nav button{background:var(--panel2);color:var(--mut);border:1px solid var(--line);border-radius:18px;padding:6px 14px;cursor:pointer;font-size:13px}
  nav button.active{background:var(--acc);color:#04122a;border-color:var(--acc);font-weight:600}
  main{max-width:980px;margin:0 auto;padding:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px}
  .card h2{margin:0 0 4px;font-size:16px}
  .card p.desc{margin:0 0 14px;color:var(--mut);font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
  label{display:block;font-size:12px;color:var(--mut);margin-bottom:4px}
  .field{margin-bottom:2px}
  .out{margin-top:14px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:14px;white-space:pre-wrap;font-variant-numeric:tabular-nums}
  .out b{color:var(--ok)}
  .res-main{font-size:18px;font-weight:650;color:var(--ok)}
  .hint{color:var(--mut);font-size:12px;margin-top:8px}
  .warnbox{border-left:3px solid var(--warn);background:#241f12;padding:8px 12px;border-radius:6px;color:#f0d9a0;font-size:12.5px;margin-top:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border:1px solid var(--line);padding:5px 7px;text-align:center;font-variant-numeric:tabular-nums}
  th{background:var(--panel2);color:var(--mut);font-weight:600}
  .tag{display:inline-block;font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:6px;padding:1px 7px;margin-left:6px}
  .src{color:var(--mut);font-size:11.5px;margin-top:6px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:640px){.row2{grid-template-columns:1fr}}
  code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12.5px}
</style>
</head>
<body>
<header>
  <h1>Kalkulator SIKO</h1>
  <span class="sub">Strzelanie i Kierowanie Ogniem — artyleria naziemna · v1 (offline)</span>
  <div class="unit">
    tysięczna:
    <select id="unit" onchange="recalcAll()">
      <option value="6000">artyleryjska 1/6000</option>
      <option value="6400">Rimailho / mils 1/6400</option>
    </select>
  </div>
</header>

<nav id="nav"></nav>
<main id="main"></main>

<script>
/* ============================================================
   KALKULATOR SIKO — silnik obliczeniowy
   Wzory wg ISiKO DTU-3.2.5.6.1 oraz DU-3.2.5.7.2 (geodezja).
   Wartości z tabel strzelniczych (TS) są DANYMI WEJŚCIOWYMI —
   aplikacja niczego nie zgaduje z TS.
   ============================================================ */

/* --- jednostka kątowa --- */
function fullCircle(){ return parseInt(document.getElementById('unit').value); }
// współczynniki "wzoru rozwarcia": metry<->tysięczne
function k_m2tys(){ return fullCircle()===6000 ? 0.95 : 1.018; } // m -> tys
function k_tys2m(){ return fullCircle()===6000 ? 1.05 : 0.982; } // tys -> m
function milToRad(m){ return m * 2*Math.PI / fullCircle(); }
function radToMil(r){ let m = r * fullCircle() / (2*Math.PI); return ((m%fullCircle())+fullCircle())%fullCircle(); }

/* --- parsowanie i format tysięcznych "X-YY" --- */
function parseMil(s){
  if(s===null||s===undefined) return NaN;
  s=(''+s).trim().replace(',', '.');
  if(s==='') return NaN;
  let neg=false;
  if(s[0]==='-' && s.indexOf('-',1)>0){ neg=true; s=s.slice(1); } // np. -0-52
  if(s.includes('-')){
    let p=s.split('-'); let v=Math.abs(parseInt(p[0]||'0'))*100+parseInt(p[1]||'0');
    return neg? -v : v;
  }
  return parseFloat(s); // zwykła liczba mils
}
function fmtMil(v){
  let neg=v<0; v=Math.round(Math.abs(v));
  let big=Math.floor(v/100), small=v%100;
  return (neg?'-':'+')+big+'-'+String(small).padStart(2,'0');
}
function num(id){ return parseFloat((document.getElementById(id).value||'').replace(',','.')); }
function mil(id){ return parseMil(document.getElementById(id).value); }

/* ============================================================
   MODUŁY
   ============================================================ */
const MODULES = [
 {id:'dow', name:'Arkusz dowiązania'},
 {id:'zgzzgo', name:'Geodezja ZGZ/ZGO'},
 {id:'katpol', name:'Kąt położenia'},
 {id:'rozwarcie', name:'Rozwarcie / wstrzeliwanie'},
 {id:'aot', name:'AOT (rakietowa)'},
 {id:'poprawki', name:'Poprawki sumaryczne'},
 {id:'meteo', name:'Dekoder meteo'},
 {id:'mils', name:'Przelicznik kątów'},
 {id:'nastawy', name:'Nastawy z TS'},
 {id:'ts', name:'Tabele strzelnicze'},
];


/* ---------- 0. Arkusz dowiązania geodezyjnego ---------- */
let DOW_POINTS=[];
const DOW_RODZ=['SO','PO','SD','PWD','KO','BUS'];
function ui_dow(){
  let rows=DOW_POINTS.map((p,i)=>`
    <tr>
      <td>${i+1}</td>
      <td><input data-i="${i}" data-k="nazwa" value="${p.nazwa||''}" oninput="dowUpd(this)" style="width:84px"></td>
      <td><select data-i="${i}" data-k="rodzaj" onchange="dowUpd(this)">${DOW_RODZ.map(x=>`<option ${p.rodzaj===x?'selected':''}>${x}</option>`).join('')}</select></td>
      <td><input data-i="${i}" data-k="X" value="${p.X||''}" oninput="dowUpd(this)" style="width:88px"></td>
      <td><input data-i="${i}" data-k="Y" value="${p.Y||''}" oninput="dowUpd(this)" style="width:88px"></td>
      <td><input data-i="${i}" data-k="H" value="${p.H||''}" oninput="dowUpd(this)" style="width:56px"></td>
      <td><input data-i="${i}" data-k="T" value="${p.T||''}" oninput="dowUpd(this)" placeholder="12-50" style="width:64px"></td>
      <td><input data-i="${i}" data-k="cel" value="${p.cel||''}" oninput="dowUpd(this)" style="width:84px"></td>
      <td><input data-i="${i}" data-k="uwagi" value="${p.uwagi||''}" oninput="dowUpd(this)" style="width:90px"></td>
      <td style="white-space:nowrap">
        <button onclick="dowToZGZ(${i})" title="wczytaj jako punkt A do ZGZ" style="cursor:pointer;font-size:11px;padding:2px 6px;margin:1px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:5px">→ZGZ</button>
        <button onclick="dowToZGO(${i})" title="wczytaj jako punkt A do ZGO" style="cursor:pointer;font-size:11px;padding:2px 6px;margin:1px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:5px">→ZGO</button>
        <button onclick="dowDel(${i})" title="usuń" style="cursor:pointer;font-size:11px;padding:2px 6px;margin:1px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:5px">✕</button>
      </td>
    </tr>`).join('');
  return `
<div class="card">
  <h2>Arkusz dowiązania geodezyjnego<span class="tag">DTU-3.2.5.7.2</span></h2>
  <p class="desc">Rejestr punktów dowiązania (SO, PO, SD, PWD, kierunki orientacyjne): współrzędne, wysokość, azymut kierunku orientacyjnego. Współrzędne: X = północna (N), Y = wschodnia (E). Punkt można wczytać prosto do zadań ZGZ/ZGO.</p>
  <div style="overflow-x:auto">
  <table>
    <tr><th>Lp.</th><th>Nazwa</th><th>Rodzaj</th><th>X (N) [m]</th><th>Y (E) [m]</th><th>H [m]</th><th>Azymut T [tys.]</th><th>na punkt</th><th>Uwagi</th><th>akcje</th></tr>
    ${rows||'<tr><td colspan="10" style="color:var(--mut)">— brak punktów — dodaj pierwszy —</td></tr>'}
  </table>
  </div>
  <button onclick="dowAdd()" style="cursor:pointer;font-size:11px;padding:2px 6px;margin:1px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:5px;font-size:13px;padding:7px 14px;margin-top:10px">+ dodaj punkt</button>
  <div class="hint">Dane przechowywane w pamięci sesji (dopóki strona jest otwarta). Pełny formularz do wydruku/archiwum — w skoroszycie Excel, arkusz „Arkusz dowiązania".</div>
</div>`;
}
function dowAdd(){ DOW_POINTS.push({nazwa:'',rodzaj:'SO',X:'',Y:'',H:'',T:'',cel:'',uwagi:''}); show('dow'); }
function dowDel(i){ DOW_POINTS.splice(i,1); show('dow'); }
function dowUpd(el){ DOW_POINTS[+el.dataset.i][el.dataset.k]=el.value; }
function dowToZGZ(i){ let p=DOW_POINTS[i]; show('zgzzgo'); setTimeout(()=>{
  if(p.Y)document.getElementById('zgz_EA').value=p.Y;
  if(p.X)document.getElementById('zgz_NA').value=p.X;
  if(p.T)document.getElementById('zgz_T').value=p.T; calc_zgz(); },30); }
function dowToZGO(i){ let p=DOW_POINTS[i]; show('zgzzgo'); setTimeout(()=>{
  if(p.Y)document.getElementById('zgo_EA').value=p.Y;
  if(p.X)document.getElementById('zgo_NA').value=p.X; calc_zgo(); },30); }

/* ---------- 1. ZGZ / ZGO ---------- */
function ui_zgzzgo(){return `
<div class="card">
  <h2>ZGZ — zadanie geodezyjne zwykłe (wprost)<span class="tag">DU-3.2.5.7.2 pkt 0601</span></h2>
  <p class="desc">Dane: punkt A (E,N), azymut T<sub>AB</sub> i odległość d<sub>AB</sub> → współrzędne B.</p>
  <div class="grid">
    <div class="field"><label>E_A [m]</label><input id="zgz_EA" value="" oninput="calc_zgz()"></div>
    <div class="field"><label>N_A [m]</label><input id="zgz_NA" value="" oninput="calc_zgz()"></div>
    <div class="field"><label>Azymut T_AB (np. 12-50)</label><input id="zgz_T" value="" oninput="calc_zgz()"></div>
    <div class="field"><label>Odległość d_AB [m]</label><input id="zgz_d" value="" oninput="calc_zgz()"></div>
  </div>
  <div class="out" id="zgz_out">—</div>
  <div class="src">E_B = E_A + d·sin T &nbsp;[35] &nbsp;·&nbsp; N_B = N_A + d·cos T &nbsp;[36]</div>
</div>
<div class="card">
  <h2>ZGO — zadanie geodezyjne odwrotne<span class="tag">DU-3.2.5.7.2 pkt 0602</span></h2>
  <p class="desc">Dane: punkty A (E,N) i B (E,N) → azymut T<sub>AB</sub> i odległość d<sub>AB</sub>.</p>
  <div class="grid">
    <div class="field"><label>E_A [m]</label><input id="zgo_EA" value="" oninput="calc_zgo()"></div>
    <div class="field"><label>N_A [m]</label><input id="zgo_NA" value="" oninput="calc_zgo()"></div>
    <div class="field"><label>E_B [m]</label><input id="zgo_EB" value="" oninput="calc_zgo()"></div>
    <div class="field"><label>N_B [m]</label><input id="zgo_NB" value="" oninput="calc_zgo()"></div>
  </div>
  <div class="out" id="zgo_out">—</div>
  <div class="src">d = √(ΔE²+ΔN²) [41] · t = arctg(ΔE/ΔN) [38] · azymut wg ćwiartki (znaki ΔE, ΔN)</div>
</div>`;}
function calc_zgz(){
  let EA=num('zgz_EA'),NA=num('zgz_NA'),T=mil('zgz_T'),d=num('zgz_d');
  let o=document.getElementById('zgz_out');
  if([EA,NA,T,d].some(isNaN)){o.textContent='—';return;}
  let r=milToRad(T);
  let EB=EA+d*Math.sin(r), NB=NA+d*Math.cos(r);
  o.innerHTML=`ΔE = d·sin T = ${(d*Math.sin(r)).toFixed(1)} m\nΔN = d·cos T = ${(d*Math.cos(r)).toFixed(1)} m\n<span class="res-main">E_B = ${EB.toFixed(1)} m &nbsp; N_B = ${NB.toFixed(1)} m</span>`;
}
function calc_zgo(){
  let EA=num('zgo_EA'),NA=num('zgo_NA'),EB=num('zgo_EB'),NB=num('zgo_NB');
  let o=document.getElementById('zgo_out');
  if([EA,NA,EB,NB].some(isNaN)){o.textContent='—';return;}
  let dE=EB-EA, dN=NB-NA;
  let d=Math.hypot(dE,dN);
  let t=Math.atan(Math.abs(dE)/Math.abs(dN)); // czwartak (rad)
  let tm=radToMil(t);
  let fc=fullCircle(), half=fc/2;
  let T, cw;
  if(dE>=0&&dN>=0){T=tm;cw='I';}
  else if(dE>=0&&dN<0){T=half-tm;cw='II';}
  else if(dE<0&&dN<0){T=half+tm;cw='III';}
  else {T=fc-tm;cw='IV';}
  o.innerHTML=`ΔE = ${dE.toFixed(1)}  ΔN = ${dN.toFixed(1)}  → ćwiartka ${cw}\nczwartak t = ${fmtMil(tm).replace('+','')}\nodległość d_AB = <b>${d.toFixed(1)} m</b>\n<span class="res-main">Azymut T_AB = ${fmtMil(T).replace('+','')}</span>`;
}

/* ---------- 2. Kąt położenia ---------- */
function ui_katpol(){return `
<div class="card">
  <h2>Kąt położenia celu i poprawka kąta podniesienia<span class="tag">ISiKO DTU-3.2.5.6.1</span></h2>
  <p class="desc">ΔZ = Z_c − Z_SO · p = (ΔZ / (0,001·D)) · k · Δφ = p + ΔC (ΔC z TS).</p>
  <div class="grid">
    <div class="field"><label>Wysokość celu Z_c [m npm]</label><input id="kp_Zc" oninput="calc_kp()"></div>
    <div class="field"><label>Wysokość SO Z_SO [m npm]</label><input id="kp_Zso" oninput="calc_kp()"></div>
    <div class="field"><label>Odległość topogr. D [m]</label><input id="kp_D" oninput="calc_kp()"></div>
    <div class="field"><label>ΔC z TS (tys, opcjonalnie)</label><input id="kp_dC" value="0" oninput="calc_kp()"></div>
  </div>
  <div class="out" id="kp_out">—</div>
  <div class="hint">Współczynnik k = 0,95 (1/6000) lub 1,05 (1/6400) — zależnie od wybranej tysięcznej.</div>
</div>`;}
function calc_kp(){
  let Zc=num('kp_Zc'),Zso=num('kp_Zso'),D=num('kp_D'),dC=num('kp_dC');
  let o=document.getElementById('kp_out');
  if([Zc,Zso,D].some(isNaN)){o.textContent='—';return;}
  let dZ=Zc-Zso;
  let k=k_m2tys();
  let p=(dZ/(0.001*D))*k;
  let out=`ΔZ = Z_c − Z_SO = ${dZ.toFixed(0)} m\np = (ΔZ / (0,001·D)) · ${k} = <b>${p.toFixed(2)} tys</b>`;
  if(!isNaN(dC)){ out+=`\nΔφ = p? + ΔC → poprawka kąta podniesienia = ${ (p+dC).toFixed(2)} tys`; }
  o.innerHTML=out;
}

/* ---------- 3. Rozwarcie / wstrzeliwanie ---------- */
function ui_rozwarcie(){return `
<div class="card">
  <h2>Wzór rozwarcia — przeliczenia<span class="tag">ISiKO</span></h2>
  <p class="desc">Zamiana uchyleń obserwatora (tysięczne ↔ metry) i poprawek kierunku ze SO.</p>
  <div class="grid">
    <div class="field"><label>Uchylenie α [tys] (z PO)</label><input id="rz_atys" oninput="calc_rz()"></div>
    <div class="field"><label>Odległość obserwacji d [m]</label><input id="rz_d" oninput="calc_rz()"></div>
    <div class="field"><label>Poprawka kierunku ΔK [m]</label><input id="rz_dKm" oninput="calc_rz()"></div>
    <div class="field"><label>Odległość topogr. D_T [m] (SO→cel)</label><input id="rz_DT" oninput="calc_rz()"></div>
    <div class="field"><label>Poprawka donośności ΔD [m]</label><input id="rz_dD" oninput="calc_rz()"></div>
    <div class="field"><label>ΔX_tys (z TS, m/tys)</label><input id="rz_dX" oninput="calc_rz()"></div>
  </div>
  <div class="out" id="rz_out">—</div>
</div>
<div class="card">
  <h2>Snop, ustopniowanie, zużycie</h2>
  <div class="grid">
    <div class="field"><label>Szerokość celu S_c [m]</label><input id="rz_Sc" oninput="calc_snop()"></div>
    <div class="field"><label>Głębokość celu G_c [m]</label><input id="rz_Gc" oninput="calc_snop()"></div>
    <div class="field"><label>Liczba środków n</label><input id="rz_n" oninput="calc_snop()"></div>
    <div class="field"><label>D_T [m]</label><input id="rz_DT2" oninput="calc_snop()"></div>
    <div class="field"><label>ΔX_tys (z TS)</label><input id="rz_dX2" oninput="calc_snop()"></div>
  </div>
  <div class="out" id="snop_out">—</div>
  <div class="src">I = S_c/(n·0,001·D_T) · ustopniowanie s = G_c/(3·ΔX_tys) · l.hyń = S_c/n</div>
</div>`;}
function calc_rz(){
  let atys=num('rz_atys'),d=num('rz_d'),dKm=num('rz_dKm'),DT=num('rz_DT'),dD=num('rz_dD'),dX=num('rz_dX');
  let o=document.getElementById('rz_out');let lines=[];
  if(!isNaN(atys)&&!isNaN(d)){ lines.push(`α[m] = α[tys]·0,001·d·${k_tys2m()} = <b>${(atys*0.001*d*k_tys2m()).toFixed(1)} m</b>`); }
  if(!isNaN(dD)&&!isNaN(dX)&&dX!==0){ lines.push(`ΔC = ΔD/ΔX_tys = <b>${(dD/dX).toFixed(1)}</b> (zaokr. ${Math.round(dD/dX)})`); }
  if(!isNaN(dKm)&&!isNaN(DT)){ lines.push(`ΔK[tys] = ΔK[m]/(0,001·D_T)·${k_m2tys()} = <b>${fmtMil(dKm/(0.001*DT)*k_m2tys())}</b>`); }
  o.innerHTML=lines.length?lines.join('\n'):'—';
}
function calc_snop(){
  let Sc=num('rz_Sc'),Gc=num('rz_Gc'),n=num('rz_n'),DT=num('rz_DT2'),dX=num('rz_dX2');
  let o=document.getElementById('snop_out');let lines=[];
  if(!isNaN(Sc)&&!isNaN(n)&&!isNaN(DT)&&n!==0){ let I=Sc/(n*0.001*DT); lines.push(`Interwał snopa I = ${I.toFixed(2)} → <b>${fmtMil(I)}</b>`); }
  if(!isNaN(Gc)&&!isNaN(dX)&&dX!==0){ lines.push(`Ustopniowanie s = G_c/(3·ΔX_tys) = <b>${(Gc/(3*dX)).toFixed(1)}</b>`); }
  if(!isNaN(Sc)&&!isNaN(n)&&n!==0){ let l=Sc/n; lines.push(`l. hyń (S_c/n) = <b>${l.toFixed(1)} m</b> ${l>25?'→ co najmniej 2 hyń (jeśli >25 m)':'→ 1 hyń (≤25 m, ≤50 m wg reżimu)'}`); }
  o.innerHTML=lines.length?lines.join('\n'):'—';
}

/* ---------- 4. AOT (artyleria rakietowa) ---------- */
function ui_aot(){return `
<div class="card">
  <h2>Poprawki na aktywnym odcinku toru (AOT)<span class="tag">ISiKO pkt 17 · TS s.42</span></h2>
  <p class="desc">ΔC_A = 0,1·ΔC_Wa·W_a + 0,1·ΔC_W·W &nbsp;·&nbsp; ΔK_A = 0,1·ΔZ_Wa·W_a + 0,1·ΔZ_W·W</p>
  <div class="grid">
    <div class="field"><label>W_a — wiatr podłużny na AOT [m/s]</label><input id="ao_Wa" oninput="calc_aot()"></div>
    <div class="field"><label>W — wiatr poprzeczny na AOT [m/s]</label><input id="ao_W" oninput="calc_aot()"></div>
    <div class="field"><label>ΔC_Wa (TS)</label><input id="ao_CWa" oninput="calc_aot()"></div>
    <div class="field"><label>ΔC_W (TS)</label><input id="ao_CW" oninput="calc_aot()"></div>
    <div class="field"><label>ΔZ_Wa (TS)</label><input id="ao_ZWa" oninput="calc_aot()"></div>
    <div class="field"><label>ΔZ_W (TS)</label><input id="ao_ZW" oninput="calc_aot()"></div>
    <div class="field"><label>Celownik pośredni φ_P (opc.)</label><input id="ao_phiP" oninput="calc_aot()"></div>
    <div class="field"><label>kp pośredni (Kz) tys (opc.)</label><input id="ao_kpP" oninput="calc_aot()"></div>
  </div>
  <div class="out" id="aot_out">—</div>
</div>`;}
function calc_aot(){
  let Wa=num('ao_Wa'),W=num('ao_W'),CWa=num('ao_CWa'),CW=num('ao_CW'),ZWa=num('ao_ZWa'),ZW=num('ao_ZW');
  let o=document.getElementById('aot_out');
  if([Wa,W,CWa,CW,ZWa,ZW].some(isNaN)){o.textContent='—';return;}
  let dCA=0.1*CWa*Wa + 0.1*CW*W;
  let dKA=0.1*ZWa*Wa + 0.1*ZW*W;
  let out=`ΔC_A = 0,1·(${CWa})·(${Wa}) + 0,1·(${CW})·(${W}) = <b>${dCA.toFixed(2)}</b> (zaokr. ${Math.round(dCA)})\nΔK_A = 0,1·(${ZWa})·(${Wa}) + 0,1·(${ZW})·(${W}) = <b>${fmtMil(dKA)}</b>`;
  let phiP=num('ao_phiP'), kpP=mil('ao_kpP');
  if(!isNaN(phiP)) out+=`\nφ_C = φ_P + ΔC_A = <span class="res-main">${Math.round(phiP+dCA)}</span>`;
  if(!isNaN(kpP)) out+=`\nkp_C(Kz) = kp_P + ΔK_A = <span class="res-main">${fmtMil(kpP+dKA)}</span>`;
  o.innerHTML=out;
}

/* ---------- 5. Poprawki sumaryczne donośności ---------- */

    </div>

      <div class="field"><label>ΔX_tpr (TS)</label><input id="pp_Xtpr" oninput="calc_pp()"></div>

</div>
<div class="card">
  <h2>Δh_SO i sumaryczna odchyłka V₀ (tworzenie Cp)</h2>
  <div class="grid">
    <div class="field"><label>Δh przyziemne [mmHg]</label><input id="v_dh" oninput="calc_v0()"></div>
    <div class="field"><label>Z_M — wys. stacji meteo</label><input id="v_ZM" oninput="calc_v0()"></div>

function calc_v0(){

}

function calc_meteo(){
  let raw=document.getElementById('me_in').value.trim();

  if(!raw){o.textContent='—';return;}
  let toks=raw.replace(/meteo/i,'').split(/[\s\-–]+/).filter(x=>x.length);

  o.textContent=out;
}

function calc_mils(src){
  let deg;
  if(src==='6000'){ let v=parseMil(document.getElementById('ml_6000').value); if(isNaN(v))return; deg=v/6000*360; }
  else if(src==='6400'){ let v=parseMil(document.getElementById('ml_6400').value); if(isNaN(v))return; deg=v/6400*360; }
  else { let v=parseFloat((document.getElementById('ml_deg').value||'').replace(',','.')); if(isNaN(v))return; deg=v; }
  if(src!=='6000') document.getElementById('ml_6000').value=fmtMil(deg/360*6000).replace('+','');
  if(src!=='6400') document.getElementById('ml_6400').value=fmtMil(deg/360*6400).replace('+','');
  if(src!=='deg') document.getElementById('ml_deg').value=deg.toFixed(2);
}

function tsInterp(variant,D){
  const rows=TS_TABLES[variant].rows.filter(r=>typeof r.D==='number');
  for(const r of rows){ if(r.D===D) return {row:{...r},exact:true}; }
  const s=rows.slice().sort((a,b)=>a.D-b.D);
  if(D<s[0].D||D>s[s.length-1].D) return {oor:true};
  let lo=null,hi=null;
  for(let i=0;i<s.length-1;i++){ if(D>=s[i].D&&D<=s[i+1].D){lo=s[i];hi=s[i+1];break;} }
  if(!lo) return {oor:true};
  let t=(D-lo.D)/(hi.D-lo.D),out={};
  for(const k in lo){ let a=lo[k],b=hi[k];
    out[k]=(typeof a==='number'&&typeof b==='number')?a+(b-a)*t:(a!=null?a:b); }
  return {row:out,exact:false,lo:lo.D,hi:hi.D};
}
function degToMil(deg){ return deg/360*fullCircle(); }
function ui_nastawy(){
  let opts=Object.keys(TS_TABLES).map(k=>`<option value="${k}">${TS_TABLES[k].label}</option>`).join('');
  return `
<div class="card">
  <h2>Nastawy z tabel strzelniczych — M-210F<span class="tag">interpolacja po D</span></h2>
  <p class="desc">Wybierz wariant pierścienia hamującego i podaj donośność topograficzną D. Kalkulator interpoluje celownik, kąty, czas lotu, prędkość i wszystkie współczynniki poprawek z przepisanych TS (TS-74 / TS-74M / TS-74B).</p>
  <div class="grid">
    <div class="field"><label>Wariant</label><select id="ns_var" onchange="calc_ns()">${opts}</select></div>
    <div class="field"><label>Donośność D [m]</label><input id="ns_D" placeholder="np. 8350" oninput="calc_ns()"></div>
  </div>
  <div class="out" id="ns_out">—</div>
  <div class="warnbox">Współczynniki wiatru (ΔZ/ΔC/ΔX_Wbx) oraz Y_k przepisano ze skanu i oznaczono do weryfikacji — sprawdź z oryginałem przed użyciem bojowym. Kolumny celownik/kąty/czas/Vc/temperatura/ciśnienie są zweryfikowane (monotoniczność i ciągłość).</div>
</div>`;
}
function calc_ns(){
  let variant=document.getElementById('ns_var').value, D=num('ns_D'), o=document.getElementById('ns_out');
  if(isNaN(D)){o.textContent='—';return;}
  let r=tsInterp(variant,D);
  if(r.oor){ let rr=TS_TABLES[variant].rows.filter(x=>typeof x.D==='number'); o.innerHTML=`<span style="color:var(--warn)">D poza zakresem tabeli (${rr[0].D}–${Math.max(...rr.map(x=>x.D))} m).</span>`; return; }
  let row=r.row;
  function f(k,d=1){ let v=row[k]; return v==null?'—':(Math.abs(v)>=100?Math.round(v):(+v).toFixed(d)); }
  let cmil=row.c!=null?fmtMil(degToMil(row.c)).replace('+',''):'—';
  let head=r.exact?`Wiersz dokładny D=${D} m`:`Interpolacja: D=${r.lo}…${r.hi} m`;
  let h=`<b>${head}</b>\n`;
  h+=`<span class="res-main">Celownik C = ${f('C',0)} tys</span>\n`;
  h+=`Kąt celownika c = ${row.c!=null?(+row.c).toFixed(2)+'° ('+cmil+' tys)':'—'} · kąt upadku ${f('w',1)}°\n`;
  h+=`Czas lotu t_c = ${f('tc',1)} s · prędkość końcowa V_c = ${f('Vc',0)} m/s\n`;
  h+=`ΔX na 1 tys celownika = ${f('dXc',0)} m · Ug ${f('Ug',0)} · Us ${f('Us',0)} · Y_wierzch ${f('Y',0)} m\n`;
  h+=`\n<b>Poprawki donośności (na jednostkę odchyłki):</b>\n`;
  h+=`ΔX_t° = ${f('Xt',0)} m/10°C (−) · ΔX_h = ${f('Xh',0)} m/10mm (+)\n`;
  h+=`ΔX_ład = ${f('Xtlm',0)} / ${f('Xtlp',0)} m/10°C (odchyłka −/+) · ΔX_W bierny = ${f('XWbx',0)} m/10 m/s (−)\n`;
  h+=`\n<b>Współczynniki AOT (wiatr na aktywnym odcinku, /10 m/s):</b>\n`;
  h+=`ΔC_W50=${f('CW50',1)} · ΔC_Wax=${f('CWax',1)} · ΔZ_W50=${f('ZW50',1)} · ΔZ_Wax=${f('ZWax',1)} · ΔZ_Wbz=${f('ZWbz',1)}\n`;
  h+=`Y_k (wejście „meteo-średni") ≈ ${f('Yk',0)} m`;
  window._nsRow=row;
  o.innerHTML=h+`\n\n<button onclick="pushTo('pp')" style="cursor:pointer;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 10px;margin-top:8px">→ wstaw ΔX do „Poprawki sumaryczne"</button> &nbsp;<button onclick="pushTo('aot')" style="cursor:pointer;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 10px">→ wstaw współczynniki do „AOT"</button>`;
}
function pushTo(which){
  let row=window._nsRow; if(!row) return;
  if(which==='pp'){ show('poprawki'); setTimeout(()=>{
    if(row.Xtlm!=null)document.getElementById('pp_Xtpr').value=Math.round(row.Xtlm);
    if(row.Xt!=null)document.getElementById('pp_Xt').value=Math.round(row.Xt);
    if(row.Xh!=null)document.getElementById('pp_Xh').value=Math.round(row.Xh);
    if(row.XWbx!=null)document.getElementById('pp_XW').value=Math.round(row.XWbx); calc_pp(); },30);
  } else { show('aot'); setTimeout(()=>{
    if(row.CWax!=null)document.getElementById('ao_CWa').value=(+row.CWax).toFixed(1);
    if(row.CW50!=null)document.getElementById('ao_CW').value=(+row.CW50).toFixed(1);
    if(row.ZWax!=null)document.getElementById('ao_ZWa').value=(+row.ZWax).toFixed(1);
    if(row.ZW50!=null)document.getElementById('ao_ZW').value=(+row.ZW50).toFixed(1); calc_aot(); },30);
  }
}

/* ---------- 8. Tabele strzelnicze (TS) ---------- */
/* Dane TS — struktura wielosystemowa. Wartości przepisywane ze skanów TS i WERYFIKOWANE.
   Seed: M-210F (122 mm, WR-40) — współczynniki AOT zweryfikowane na przykładzie
   "Mistrz Ognia Artylerii 2021" dla celownika φ≈606 (TS s.42). */
const TS_DATA = {
  "M-210F (122 mm, WR-40 Langusta)": {
    zrodlo:"TS do pocisków odł.-burz. M-210F, Art.635/79 (skan na Dysku)",
    aot:[ // wg celownika φ_P ; współczynniki na 10 m/s
      {phi:606, dCWa:-32.9, dCW:-9.2, dZWa:-6, dZW:61, _zrodlo:"zweryfikowane (Mistrz Ognia 2021, s.42)"}
    ],
    don:[ /* {phi, D, dXtpr, dXt, dXh, dXW, dXV0} — DO UZUPEŁNIENIA ze skanu */ ]
  }
};
function ui_ts(){
  let rows='';
  for(const [sys,o] of Object.entries(TS_DATA)){
    rows+=`<tr><th colspan="6" style="text-align:left">${sys} <span class="tag">${o.zrodlo}</span></th></tr>`;
    rows+=`<tr><th>φ (celownik)</th><th>ΔC_Wa</th><th>ΔC_W</th><th>ΔZ_Wa</th><th>ΔZ_W</th><th>źródło</th></tr>`;
    if(o.aot.length) o.aot.forEach(r=>{ rows+=`<tr><td>${r.phi}</td><td>${r.dCWa}</td><td>${r.dCW}</td><td>${r.dZWa}</td><td>${r.dZW}</td><td style="font-size:11px">${r._zrodlo||''}</td></tr>`; });
    else rows+=`<tr><td colspan="6" style="color:var(--mut)">— brak danych — do przepisania ze skanu —</td></tr>`;
  }
  return `
<div class="card">
  <h2>Tabele strzelnicze (wbudowane)</h2>
  <p class="desc">Wartości przepisane ze skanów TS i zweryfikowane. Dane rosną iteracyjnie — kolejne strony dokładamy stopniowo.</p>
  <table>${rows}</table>
  <div class="warnbox"><b>Status digitalizacji TS:</b> Załadowano pełne tabele TS-74 (94 w.), TS-74M (75 w.), TS-74B (55 w.) — moduł „Nastawy z TS" interpoluje celownik i poprawki po donośności. Współczynniki AOT seed (φ=606) — M-210F — współczynniki AOT (φ=606) zweryfikowane. Pozostałe wiersze (donośność↔celownik, ΔX poprawek dla pełnego zakresu donośności) — do przepisania ze skanu „TS M-210F.pdf" na Dysku. Aplikacja używa tych danych jako wejścia do modułów AOT / Poprawki — interpolacja zostanie włączona po wprowadzeniu pełnych wierszy.</div>
</div>`;}

/* ============================================================
   ROUTER / RENDER
   ============================================================ */
const RENDER={dow:ui_dow,zgzzgo:ui_zgzzgo,katpol:ui_katpol,rozwarcie:ui_rozwarcie,aot:ui_aot,poprawki:ui_poprawki,meteo:ui_meteo,mils:ui_mils,nastawy:ui_nastawy,ts:ui_ts};
let current='zgzzgo';
function show(id){
  current=id;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  document.getElementById('main').innerHTML=RENDER[id]();
}
function recalcAll(){ show(current); }
function init(){
  let nav=document.getElementById('nav');
  MODULES.forEach(m=>{ let b=document.createElement('button'); b.textContent=m.name; b.dataset.id=m.id; b.onclick=()=>show(m.id); nav.appendChild(b); });
  show('zgzzgo');
}
init();

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
</body>
